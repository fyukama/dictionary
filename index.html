<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dictionary App</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:420px;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.3);
text-align:center;
}

h1{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
font-size:18px;
border:1px solid #ccc;
border-radius:8px;
margin-bottom:15px;
}

button{
padding:12px 25px;
background:#2196f3;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1565c0;
}

#result{
margin-top:20px;
text-align:left;
line-height:1.6;
word-wrap:break-word;
}
</style>

</head>
<body>

<div class="container">

<h1>📖 Dictionary App</h1>

<input
type="text"
id="word"
placeholder="Enter a word">

<button onclick="searchWord()">
Search
</button>

<div id="result"></div>

</div>

<script>

const apiKey="rDrq0hFe0lvWrjWq4ur7zLJVnJjM8yUjsy4bY89K"
;
// Example:
// const apiKey="abcd123456";

async function searchWord(){

const word=document.getElementById("word").value.trim();

if(word===""){
alert("Please enter a word");
return;
}

document.getElementById("result").innerHTML="Searching...";

try{

const response=await fetch(
`https://api.api-ninjas.com/v1/dictionary?word=${word}`,
{
headers:{
"X-Api-Key":apiKey
}
}
);

const data=await response.json();

if(data.valid){

document.getElementById("result").innerHTML=`
<h2>${data.word}</h2>
<hr><br>
<p>${data.definition.replace(/\n/g,"<br><br>")}</p>
`;

}else{

document.getElementById("result").innerHTML=
"<h2>❌ Word not found.</h2>";

}

}catch(e){

document.getElementById("result").innerHTML=
"<h2>Error connecting to API.</h2>";

}

}

document.getElementById("word").addEventListener("keypress",function(e){
if(e.key==="Enter"){
searchWord();
}
});

</script>

</body>
</html>
