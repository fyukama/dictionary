<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Directory</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f4f4;
}

.container{
    width:700px;
    max-width:90%;
    margin:40px auto;
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.controls{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

input{
    flex:1;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:5px;
    background:#0078ff;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#005fd1;
}

.card{
    background:#eef5ff;
    padding:15px;
    margin:10px 0;
    border-radius:8px;
}

.card h3{
    margin-bottom:8px;
}

.error{
    color:red;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
    <h1>Student Directory</h1>

    <div class="controls">
        <input type="number" id="studentId" placeholder="Enter Student ID">
        <button onclick="getStudent()">Search</button>
        <button onclick="loadStudents()">Show All</button>
    </div>

    <div id="output"></div>
</div>

<script>
const output = document.getElementById("output");

async function loadStudents(){
    const response = await fetch("/students");
    const data = await response.json();

    output.innerHTML = "";

    for(const id in data){
        output.innerHTML += `
        <div class="card">
            <h3>ID: ${id}</h3>
            <p><strong>Name:</strong> ${data[id].name}</p>
            <p><strong>Semester:</strong> ${data[id].sem}</p>
        </div>
        `;
    }
}

async function getStudent(){
    const id = document.getElementById("studentId").value;

    if(!id){
        alert("Enter Student ID");
        return;
    }

    const response = await fetch(`/student/${id}`);
    const data = await response.json();

    if(data.message){
        output.innerHTML = `<p class="error">${data.message}</p>`;
    }else{
        output.innerHTML = `
        <div class="card">
            <h3>Student Details</h3>
            <p><strong>Name:</strong> ${data.name}</p>
            <p><strong>Semester:</strong> ${data.sem}</p>
        </div>
        `;
    }
}

// Load all students when the page opens
loadStudents();
</script>

</body>
</html>
