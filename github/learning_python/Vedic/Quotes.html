<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quote Generator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#fff;
    width:600px;
    max-width:90%;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

h1{
    color:#333;
    margin-bottom:20px;
}

#quote{
    font-size:22px;
    font-style:italic;
    color:#444;
    margin-bottom:20px;
    line-height:1.6;
}

#author{
    font-size:18px;
    color:#777;
    margin-bottom:25px;
}

button{
    padding:12px 25px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#667eea;
    color:#fff;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#4b5fd6;
}

.loading{
    color:green;
}

.error{
    color:red;
}
</style>
</head>
<body>

<div class="container">
    <h1>✨ Random Quote Generator</h1>

    <div id="quote">Click the button to load a quote.</div>
    <div id="author"></div>

    <button onclick="getQuote()">New Quote</button>
</div>

<script>

const API_KEY = "xbCuh4ym9psDkCeMXOjbtaSxnOWiNAkYLYsnUFnW";

async function getQuote(){

    document.getElementById("quote").innerHTML =
    "<span class='loading'>Loading...</span>";

    document.getElementById("author").innerHTML = "";

    try{

        const response = await fetch(
            "https://api.api-ninjas.com/v1/quotes",
            {
                headers:{
                    "X-Api-Key":API_KEY
                }
            }
        );

        if(!response.ok){
            throw new Error("Unable to fetch quote.");
        }

        const data = await response.json();

        document.getElementById("quote").innerHTML =
        `"${data[0].quote}"`;

        document.getElementById("author").innerHTML =
        `— ${data[0].author}`;

    }
    catch(error){

        document.getElementById("quote").innerHTML =
        `<span class="error">${error.message}</span>`;

    }

}

getQuote();

</script>

</body>
</html>
