<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictionary App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            width: 500px;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.15);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .search-box {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            font-size: 16px;
        }

        button {
            padding: 12px 18px;
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #0056b3;
        }

        #result {
            margin-top: 20px;
            line-height: 1.6;
        }

        .word {
            font-size: 26px;
            font-weight: bold;
            color: #222;
        }

        .definition {
            margin-top: 10px;
        }

        .error {
            color: red;
        }

        .loading {
            color: green;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>📖 Vedic Dictionary</h1>

    <div class="search-box">
        <input
            type="text"
            id="word"
            placeholder="Enter a word..."
        >
        <button onclick="searchWord()">Search</button>
    </div>

    <div id="result"></div>

</div>

<script>

const API_KEY = "xbCuh4ym9psDkCeMXOjbtaSxnOWiNAkYLYsnUFnW";

async function searchWord() {

    const word = document.getElementById("word").value.trim();
    const result = document.getElementById("result");

    if(word === ""){
        result.innerHTML = "<p class='error'>Please enter a word.</p>";
        return;
    }

    result.innerHTML = "<p class='loading'>Searching...</p>";

    try{

        const response = await fetch(
            `https://api.api-ninjas.com/v1/dictionary?word=${encodeURIComponent(word)}`,
            {
                method: "GET",
                headers:{
                    "X-Api-Key": API_KEY
                }
            }
        );

        if(!response.ok){
            throw new Error("Request failed");
        }

        const data = await response.json();

        if(data.valid === false || !data.definition){

            result.innerHTML =
            `<p class="error">No definition found.</p>`;

            return;
        }

        result.innerHTML = `
            <div class="word">${word}</div>
            <div class="definition">
                ${data.definition.replace(/\n/g,"<br><br>")}
            </div>
        `;

    }
    catch(error){

        result.innerHTML =
        `<p class="error">${error.message}</p>`;

    }

}

document.getElementById("word").addEventListener("keypress", function(e){
    if(e.key==="Enter"){
        searchWord();
    }
});

</script>

</body>
</html>
