<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Management UI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f9;
}

.container{
    width:90%;
    max-width:900px;
    margin:40px auto;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    color:#0077cc;
    margin-bottom:25px;
}

.search-box{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-bottom:25px;
}

input{
    padding:10px;
    width:220px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    background:#0077cc;
    color:white;
    font-size:16px;
}

button:hover{
    background:#005fa3;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table th{
    background:#0077cc;
    color:white;
}

table th,
table td{
    padding:12px;
    border:1px solid #ddd;
    text-align:center;
}

table tr:nth-child(even){
    background:#f2f2f2;
}

#result{
    margin-top:20px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
    color:#333;
}
</style>

</head>
<body>

<div class="container">

<h1>Student Management System</h1>

<div class="search-box">
<input type="number" id="studentId" placeholder="Enter Student ID">
<button onclick="searchStudent()">Search</button>
<button onclick="loadStudents()">Show All</button>
</div>

<table>

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Semester</th>
</tr>
</thead>

<tbody id="studentTable">

</tbody>

</table>

<div id="result"></div>

</div>

<script>

const API="http://127.0.0.1:8000";

async function loadStudents(){

const response=await fetch(API+"/student");

const data=await response.json();

let rows="";

for(let id in data.Student_list){

rows+=`
<tr>
<td>${id}</td>
<td>${data.Student_list[id].name}</td>
<td>${data.Student_list[id].sem}</td>
</tr>
`;

}

document.getElementById("studentTable").innerHTML=rows;

document.getElementById("result").innerHTML="";

}

async function searchStudent(){

const id=document.getElementById("studentId").value;

if(id==""){
alert("Enter Student ID");
return;
}

const response=await fetch(API+"/student/"+id);

const data=await response.json();

if(data.message){

document.getElementById("result").innerHTML=data.message;

document.getElementById("studentTable").innerHTML="";

}
else{

document.getElementById("studentTable").innerHTML=`
<tr>
<td>${id}</td>
<td>${data.name}</td>
<td>${data.sem}</td>
</tr>
`;

document.getElementById("result").innerHTML="";

}

}

loadStudents();

</script>

</body>
</html>
