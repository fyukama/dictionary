<!DOCTYPE html>
<html>
<head>
    <title>Fun Facts App</title>
    <style>
        body{
            font-family: Arial;
            background: #f2f2f2;
            text-align: center;
            padding: 50px;
        }

        .container{
            width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px yellow;
        }

        button{
            padding: 10px 20px;
            font-size: 16px;
        }

        #fact{
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🧠 Random Facts App</h2>

        <button onclick="getFact()">Get Random Fact</button>
        <button onclick="speakFact()">🔊 Listen</button>

        <div id="fact"></div>
    </div>

    <script>
        let currentFact = "";

        async function getFact() {
            const apiKey = "6UfJPPUUX1XbYIC17oNQPD45Gse2mF9LNOX9luV5";

            try {
                const response = await fetch(
                    "https://api.api-ninjas.com/v1/facts",
                    {
                        headers: {
                            "X-Api-Key": apiKey
                        }
                    }
                );

                const data = await response.json();

                currentFact = data[0].fact;
                document.getElementById("fact").innerHTML =
                    "<b>Fact:</b><br>" + currentFact;

            } catch(error) {
                document.getElementById("fact").innerHTML =
                    "Error loading fact.";
            }
        }

        function speakFact() {
            if(currentFact !== "") {
                const speech =
                    new SpeechSynthesisUtterance(currentFact);
                speech.lang = "en-US";
                window.speechSynthesis.speak(speech);
            }
        }
    </script>

</body>
</html>
